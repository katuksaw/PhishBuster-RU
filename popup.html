<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=360, initial-scale=1.0">
  <title>PhishBuster RU</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 360px;
      min-height: 200px;
      max-height: 520px;
      overflow-y: auto;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      color: #1F2937;
      background: #FFFFFF;
    }

    .header {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      background: #1E293B;
      color: white;
    }
    
    .header-logo {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    
    .header-logo span {
      color: #60A5FA;
    }
    
    .header-version {
      margin-left: auto;
      font-size: 11px;
      color: #94A3B8;
    }

    .score-section {
      padding: 20px 16px;
      text-align: center;
      border-bottom: 1px solid #E5E7EB;
    }
    
    .score-ring {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 12px;
      font-size: 32px;
      font-weight: 700;
      color: white;
    }
    
    .score-ring.safe {
      background: linear-gradient(135deg, #22C55E, #16A34A);
      box-shadow: 0 4px 12px rgba(34, 197, 94, 0.4);
    }
    
    .score-ring.warning {
      background: linear-gradient(135deg, #F59E0B, #D97706);
      box-shadow: 0 4px 12px rgba(245, 158, 11, 0.4);
    }
    
    .score-ring.danger {
      background: linear-gradient(135deg, #EF4444, #DC2626);
      box-shadow: 0 4px 12px rgba(239, 68, 68, 0.4);
    }
    
    .score-ring.neutral {
      background: linear-gradient(135deg, #6B7280, #4B5563);
      box-shadow: 0 4px 12px rgba(107, 114, 128, 0.4);
    }
    
    .verdict-text {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    
    .verdict-text.safe { color: #166534; }
    .verdict-text.warning { color: #92400E; }
    .verdict-text.danger { color: #991B1B; }
    .verdict-text.neutral { color: #374151; }
    
    .url-text {
      font-size: 12px;
      color: #6B7280;
      word-break: break-all;
      max-width: 320px;
      margin: 0 auto;
    }

    .details-section {
      padding: 16px;
    }
    
    .details-title {
      font-size: 13px;
      font-weight: 600;
      color: #374151;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    
    .reason-item {
      display: flex;
      align-items: flex-start;
      padding: 8px 12px;
      margin-bottom: 6px;
      border-radius: 6px;
      font-size: 13px;
      line-height: 1.4;
    }
    
    .reason-item.warning-reason {
      background: #FFFBEB;
      color: #92400E;
    }
    
    .reason-item.danger-reason {
      background: #FEF2F2;
      color: #991B1B;
    }
    
    .reason-item.safe-reason {
      background: #F0FDF4;
      color: #166534;
    }
    
    .reason-item.neutral-reason {
      background: #F3F4F6;
      color: #374151;
    }
    
    .reason-icon {
      margin-right: 8px;
      font-size: 16px;
      flex-shrink: 0;
    }

    .service-section {
      padding: 0 16px 16px;
      border-top: 1px solid #E5E7EB;
      padding-top: 12px;
    }
    
    .service-badge {
      display: inline-flex;
      align-items: center;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 500;
      background: #EFF6FF;
      color: #1D4ED8;
    }
    
    .service-icon {
      margin-right: 6px;
    }

    .footer {
      padding: 10px 16px;
      background: #F9FAFB;
      border-top: 1px solid #E5E7EB;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11px;
      color: #9CA3AF;
    }

    .loading {
      padding: 40px 16px;
      text-align: center;
    }
    
    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #E5E7EB;
      border-top-color: #3B82F6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .loading-text {
      font-size: 13px;
      color: #6B7280;
    }

    .error {
      padding: 24px 16px;
      text-align: center;
      color: #6B7280;
    }
    
    .error-icon {
      font-size: 32px;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-logo">Phish<span>Buster</span></div>
    <div class="header-version" id="rulesVersion">—</div>
  </div>

  <div class="loading" id="loadingState">
    <div class="loading-spinner"></div>
    <div class="loading-text">Анализируем страницу...</div>
  </div>

  <div id="resultState" style="display: none;">
    <div class="score-section">
      <div class="score-ring" id="scoreRing">
        <span id="scoreValue">—</span>
      </div>
      <div class="verdict-text" id="verdictText">—</div>
      <div class="url-text" id="urlText">—</div>
    </div>

    <div class="details-section" id="reasonsSection">
      <div class="details-title">Причины предупреждения</div>
      <div id="reasonsList"></div>
    </div>

    <div class="service-section" id="serviceSection" style="display: none;">
      <div class="service-badge" id="serviceBadge">
        <span class="service-icon" id="serviceIcon"></span>
        <span id="serviceName"></span>
      </div>
    </div>
  </div>

  <div class="error" id="errorState" style="display: none;">
    <div class="error-icon">⚠️</div>
    <div>Не удалось проанализировать страницу</div>
  </div>

  <div class="footer">
    <span>PhishBuster RU v1.0.0</span>
    <span id="cacheInfo">—</span>
  </div>

  <script src="popup.js"></script>

</html>
